<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWS Job Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');
 
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #f4f3f0; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }
 
/* ── PIN Screen ── */
#pin-screen {
  position: fixed; inset: 0; background: #1a1a1a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000;
}
.pin-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #555; margin-bottom: 32px; font-family: 'DM Mono', monospace; }
.pin-logo span { color: #fff; }
.pin-card { background: #242424; border-radius: 16px; padding: 36px 40px; width: 320px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
.pin-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.pin-subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #444; background: transparent; transition: all 0.15s; }
.pin-dot.filled { background: #fff; border-color: #fff; }
.pin-dot.error { background: #e74c3c; border-color: #e74c3c; }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pin-key { height: 56px; border: none; border-radius: 10px; background: #2e2e2e; color: #fff; font-size: 20px; font-weight: 600; cursor: pointer; transition: background 0.1s; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
.pin-key:hover { background: #3a3a3a; }
.pin-key:active { background: #484848; }
.pin-key.del { font-size: 16px; color: #888; }
.pin-key.empty { background: transparent; cursor: default; pointer-events: none; }
.pin-error { color: #e74c3c; font-size: 12px; margin-top: 16px; min-height: 18px; }
 
/* ── App ── */
#app { display: none; flex-direction: column; flex: 1; height: 100vh; }
header { background: #1a1a1a; color: #fff; padding: 11px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 14px; }
header h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
#user-badge { font-size: 11px; background: #2e2e2e; border: 1px solid #3a3a3a; border-radius: 20px; padding: 3px 10px; color: #aaa; display: flex; align-items: center; gap: 6px; }
#user-badge::before { content:''; width:7px; height:7px; border-radius:50%; background:#27ae60; flex-shrink:0; }
#header-right { display: flex; align-items: center; gap: 12px; }
#header-count { font-size: 12px; color: #666; }
#last-updated { font-size: 11px; color: #555; }
.hdr-btn { font-size: 11px; color: #888; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 5px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.hdr-btn:hover { background: #333; color: #fff; }
.hdr-btn.danger { color: #c0392b; border-color: #3a2020; }
.hdr-btn.danger:hover { background: #2a1010; color: #e74c3c; }
 
/* ── Layout ── */
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 330px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
 
/* ── Filters ── */
.filters { padding: 12px 14px 10px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
.filter-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #bbb; margin-bottom: 7px; font-family: 'DM Mono', monospace; }
.type-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.type-btn { padding: 8px 4px; border: 1.5px solid #e8e8e8; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: #aaa; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; user-select: none; font-family: 'DM Sans', sans-serif; }
.type-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: all 0.15s; }
.type-btn.on { color: #fff; }
.type-btn.on.install { border-color: #1a4a8a; background: #1a4a8a; }
.type-btn.on.service { border-color: #b84a00; background: #b84a00; }
.type-btn.on.unscheduled { border-color: #7a3db5; background: #7a3db5; }
.type-btn.on .dot { background: rgba(255,255,255,0.6); }
.type-btn:not(.on) .dot { background: #e0e0e0; }
.type-btn-unsched { grid-column: 1 / -1; }
.date-row { display: flex; gap: 6px; align-items: center; }
.date-row input[type=date] { flex: 1; border: 1px solid #e8e8e8; border-radius: 6px; padding: 6px 8px; font-size: 12px; background: #fafafa; outline: none; color: #1a1a1a; font-family: 'DM Sans', sans-serif; }
.date-row input[type=date]:focus { border-color: #999; background: #fff; }
.date-sep { font-size: 11px; color: #ccc; }
.filter-reset { font-size: 11px; color: #ccc; cursor: pointer; text-decoration: underline; margin-top: 6px; display: inline-block; }
.filter-reset:hover { color: #888; }
 
/* ── Add form ── */
.unsched-add { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; display: none; background: #fdf8ff; }
.unsched-add.visible { display: block; }
.add-form-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #c0a0e0; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
.input-row { display: flex; gap: 6px; margin-bottom: 6px; }
.input-row input { border: 1px solid #e8d8f8; border-radius: 6px; padding: 7px 10px; font-size: 12px; background: #fff; outline: none; color: #1a1a1a; font-family: 'DM Sans', sans-serif; }
.input-row input:focus { border-color: #7a3db5; }
.inp-num { width: 90px; flex-shrink: 0; }
.inp-title { flex: 1; }
.inp-addr { width: 100%; border: 1px solid #e8d8f8; border-radius: 6px; padding: 7px 10px; font-size: 12px; background: #fff; outline: none; color: #1a1a1a; margin-bottom: 6px; display: block; font-family: 'DM Sans', sans-serif; }
.inp-addr:focus { border-color: #7a3db5; }
.btn-add { width: 100%; padding: 8px; border: none; border-radius: 6px; background: #7a3db5; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: 'DM Sans', sans-serif; }
.btn-add:hover { background: #6331a0; }
.btn-add:disabled { background: #ccc; cursor: not-allowed; }
 
/* ── Job list ── */
.job-list { flex: 1; overflow-y: auto; }
.job-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background 0.1s; }
.job-item:hover { background: #fafafa; }
.job-item.highlighted { background: #eef3ff; }
.pin-badge { width: 26px; height: 26px; border-radius: 50%; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; color: #fff; font-family: 'DM Mono', monospace; }
.pin-badge.install { background: #1a4a8a; }
.pin-badge.service { background: #b84a00; }
.pin-badge.unscheduled { background: #7a3db5; }
.pin-badge.pending { background: #ddd; }
.pin-badge.error { background: #e74c3c; font-size: 8px; }
.job-info { flex: 1; min-width: 0; }
.job-num { font-size: 10px; font-weight: 700; color: #ccc; letter-spacing: 0.03em; font-family: 'DM Mono', monospace; }
.job-title { font-size: 12px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.job-addr { font-size: 11px; color: #aaa; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-meta { font-size: 10px; color: #ccc; margin-top: 3px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.badge { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding: 1px 6px; border-radius: 3px; font-family: 'DM Mono', monospace; }
.badge.install { background: #dce8f8; color: #1a4a8a; }
.badge.service { background: #fce8d8; color: #b84a00; }
.badge.unscheduled { background: #ede0f8; color: #7a3db5; }
.added-by { font-size: 9px; color: #ccc; }
.btn-remove { background: none; border: none; color: #e0e0e0; font-size: 14px; cursor: pointer; padding: 2px 4px; margin-left: auto; flex-shrink: 0; line-height: 1; }
.btn-remove:hover { color: #e74c3c; }
.no-results { padding: 40px 14px; text-align: center; color: #ccc; font-size: 13px; }
.loading-state { padding: 40px 14px; text-align: center; color: #ccc; font-size: 13px; }
 
/* ── Map ── */
.map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
.map-controls { position: absolute; top: 12px; right: 12px; z-index: 10; }
.map-btn { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 7px 12px; font-size: 12px; font-weight: 500; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-family: 'DM Sans', sans-serif; }
.map-btn:hover { background: #f5f5f5; }
.legend { position: absolute; bottom: 30px; left: 12px; background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 10px 14px; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 10; }
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #555; }
.legend-row:last-child { margin-bottom: 0; }
.legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.map-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 20; font-size: 14px; color: #aaa; }
.spinner { width: 30px; height: 30px; border: 3px solid #e8e8e8; border-top-color: #1a4a8a; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
 
<!-- PIN Screen -->
<div id="pin-screen">
  <div class="pin-logo"><span>SWS</span> Job Map</div>
  <div class="pin-card">
    <div class="pin-title">Enter PIN</div>
    <div class="pin-subtitle">Enter your 4-digit PIN to continue</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>
 
<!-- Main App -->
<div id="app">
  <header>
    <div class="header-left">
      <h1>SWS Job Map</h1>
      <div id="user-badge"></div>
    </div>
    <div id="header-right">
      <span id="last-updated"></span>
      <button class="hdr-btn" onclick="loadAll()">↻ Refresh</button>
      <span id="header-count"></span>
      <button class="hdr-btn danger" onclick="signOut()">Sign out</button>
    </div>
  </header>
 
  <div class="main">
    <div class="sidebar">
      <div class="filters">
        <div class="filter-label">Job Type</div>
        <div class="type-btns">
          <button class="type-btn install on" id="btn-install" onclick="toggleType('install')">
            <span class="dot"></span>Install
          </button>
          <button class="type-btn service on" id="btn-service" onclick="toggleType('service')">
            <span class="dot"></span>Service
          </button>
          <button class="type-btn unscheduled type-btn-unsched on" id="btn-unscheduled" onclick="toggleType('unscheduled')">
            <span class="dot"></span>Unscheduled
          </button>
        </div>
        <div class="filter-label">Date Range</div>
        <div class="date-row">
          <input type="date" id="date-from" onchange="applyFilters()" />
          <span class="date-sep">→</span>
          <input type="date" id="date-to" onchange="applyFilters()" />
        </div>
        <span class="filter-reset" onclick="resetFilters()">Reset filters</span>
      </div>
 
      <div class="unsched-add visible" id="unsched-add">
        <div class="add-form-label">Add Unscheduled Job</div>
        <div class="input-row">
          <input class="inp-num" id="u-num" type="text" placeholder="Job #" />
          <input class="inp-title" id="u-title" type="text" placeholder="Job name" />
        </div>
        <input class="inp-addr" id="u-addr" type="text" placeholder="Full address..." />
        <button class="btn-add" id="add-btn" onclick="addUnscheduled()">+ Add to map</button>
      </div>
 
      <div class="job-list" id="job-list">
        <div class="loading-state">Loading calendar...</div>
      </div>
    </div>
 
    <div class="map-container">
      <div id="map"></div>
      <div class="map-overlay" id="map-overlay">
        <div class="spinner"></div>
        <span>Loading jobs from calendar...</span>
      </div>
      <div class="map-controls">
        <button class="map-btn" onclick="fitVisible()">⊡ Fit all</button>
      </div>
      <div class="legend">
        <div class="legend-row"><div class="legend-dot" style="background:#1a4a8a"></div>Install</div>
        <div class="legend-row"><div class="legend-dot" style="background:#b84a00"></div>Service</div>
        <div class="legend-row"><div class="legend-dot" style="background:#7a3db5"></div>Unscheduled</div>
      </div>
    </div>
  </div>
</div>
 
<script>
// ── Config ────────────────────────────────────────────────────────────────────
// Your Apps Script deployment URL — update this if you redeploy
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfyJCV7R64CCB2RiRfgkOAtFb79JPhv_rXIxmkedaY4rqjEIJH7tumtXu_8UlwJW4P/exec';
 
const PINS = {
  '2580': 'Jake Banks',
  '4567': 'Ryan Chapman',
};
 
const COLORS = { install:'#1a4a8a', service:'#b84a00', unscheduled:'#7a3db5' };
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 
// ── State ─────────────────────────────────────────────────────────────────────
let map, geocoder, infoWindowOpen = null;
let scheduledJobs = [], unscheduledJobs = [];
const activeTypes = new Set(['install','service','unscheduled']);
let currentUser = null;
let pinEntry = '';
 
// ── PIN logic ─────────────────────────────────────────────────────────────────
function pinKey(k) {
  if (pinEntry.length >= 4) return;
  pinEntry += k;
  updateDots();
  if (pinEntry.length === 4) submitPin();
}
function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
  document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
}
function updateDots(state) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.className = 'pin-dot';
    if (state === 'error') dot.classList.add('error');
    else if (i < pinEntry.length) dot.classList.add('filled');
  }
}
function submitPin() {
  const user = PINS[pinEntry];
  if (user) {
    currentUser = user;
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-badge').textContent = currentUser;
    initMap();
  } else {
    updateDots('error');
    document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
    setTimeout(() => { pinEntry = ''; updateDots(); document.getElementById('pin-error').textContent = ''; }, 1200);
  }
}
function signOut() {
  currentUser = null; pinEntry = '';
  updateDots();
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  scheduledJobs.forEach(j => { if (j._marker) j._marker.setMap(null); });
  unscheduledJobs.forEach(j => { if (j._marker) j._marker.setMap(null); });
  scheduledJobs = []; unscheduledJobs = [];
}
document.addEventListener('keydown', e => {
  if (document.getElementById('pin-screen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinKey(e.key);
  if (e.key === 'Backspace') pinDel();
});
 
// ── API calls to Apps Script ──────────────────────────────────────────────────
function scriptGet(action) {
  return fetch(`${SCRIPT_URL}?action=${action}`)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}
function scriptPost(body) {
  return fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body),
  }).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}
 
// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  return `${MONTHS[+m - 1]} ${+day}`;
}
function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
 
// ── Map init ──────────────────────────────────────────────────────────────────
function initMap() {
  if (map) { loadAll(); return; }
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 33.40, lng: -111.85 }, zoom: 10,
    mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
    gestureHandling: 'greedy',
    styles: [
      { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] }
    ]
  });
  geocoder = new google.maps.Geocoder();
  const today = new Date();
  const twoMonths = new Date(today); twoMonths.setDate(twoMonths.getDate() + 60);
  document.getElementById('date-from').value = fmt(today);
  document.getElementById('date-to').value = fmt(twoMonths);
  loadAll();
}
 
function loadAll() { loadJobs(); loadUnscheduled(); }
 
// ── Toggle ────────────────────────────────────────────────────────────────────
function toggleType(type) {
  if (activeTypes.has(type)) { if (activeTypes.size === 1) return; activeTypes.delete(type); }
  else activeTypes.add(type);
  updateButtons();
  document.getElementById('unsched-add').className = 'unsched-add' + (activeTypes.has('unscheduled') ? ' visible' : '');
  applyFilters();
}
function updateButtons() {
  ['install', 'service', 'unscheduled'].forEach(t => {
    const btn = document.getElementById('btn-' + t);
    activeTypes.has(t) ? btn.classList.add('on') : btn.classList.remove('on');
  });
}
 
// ── Load scheduled jobs ───────────────────────────────────────────────────────
function loadJobs() {
  document.getElementById('job-list').innerHTML = '<div class="loading-state">Fetching calendar...</div>';
  document.getElementById('map-overlay').style.display = 'flex';
  document.getElementById('header-count').textContent = '';
 
  scriptGet('getJobs')
    .then(data => {
      scheduledJobs.forEach(j => { if (j._marker) j._marker.setMap(null); });
      scheduledJobs = data.jobs || [];
      scheduledJobs.sort((a, b) => a.start < b.start ? -1 : a.start > b.start ? 1 : 0);
      scheduledJobs.forEach(j => { j._status = 'pending'; j._marker = null; j._iw = null; });
      const ts = new Date(data.timestamp);
      document.getElementById('last-updated').textContent = `Updated ${ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
      document.getElementById('map-overlay').style.display = 'none';
      renderList();
      geocodeScheduled();
    })
    .catch(() => {
      document.getElementById('job-list').innerHTML = '<div class="no-results">Failed to load calendar.<br>Try refreshing.</div>';
      document.getElementById('map-overlay').style.display = 'none';
    });
}
 
function geocodeScheduled() {
  let delay = 0;
  scheduledJobs.forEach(job => {
    setTimeout(() => {
      if (!job.addr) { job._status = 'error'; renderList(); return; }
      geocoder.geocode({ address: job.addr }, (results, status) => {
        if (status === 'OK') {
          job._lat = results[0].geometry.location.lat();
          job._lng = results[0].geometry.location.lng();
          job._status = 'ok';
          buildScheduledMarker(job);
        } else { job._status = 'error'; }
        renderList(); updateCount();
      });
    }, delay);
    delay += 120;
  });
}
 
// ── Markers ───────────────────────────────────────────────────────────────────
function makeSVG(label, color) {
  const s = String(label);
  const fs = s.length > 2 ? '7' : s.length === 2 ? '9' : '11';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42" viewBox="0 0 34 42">
    <path d="M17 2C10.37 2 5 7.37 5 14c0 9.5 12 26 12 26s12-16.5 12-26C29 7.37 23.63 2 17 2z" fill="${color}" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <circle cx="17" cy="14" r="9.5" fill="rgba(255,255,255,0.93)"/>
    <text x="17" y="18.5" text-anchor="middle" font-family="'DM Mono',monospace" font-size="${fs}" font-weight="700" fill="${color}">${s}</text>
  </svg>`;
}
function makeIcon(label, color) {
  return {
    url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(makeSVG(label, color)),
    scaledSize: new google.maps.Size(34, 42),
    anchor: new google.maps.Point(17, 42)
  };
}
 
function buildScheduledMarker(job) {
  const color = COLORS[job.type] || COLORS.install;
  const dateStr = job.start === job.end ? fmtDate(job.start) : `${fmtDate(job.start)} – ${fmtDate(job.end)}`;
  const marker = new google.maps.Marker({
    position: { lat: job._lat, lng: job._lng }, map,
    icon: makeIcon('•', color), title: `${job.num} — ${job.title}`, zIndex: 100
  });
  const iw = new google.maps.InfoWindow({
    content: `<div style="font-family:'DM Sans',sans-serif;min-width:200px;padding:3px 0">
      <div style="font-size:10px;color:#aaa;font-weight:700;letter-spacing:.05em;font-family:'DM Mono',monospace">${job.num}</div>
      <div style="font-weight:700;font-size:13px;margin:3px 0;color:#1a1a1a">${job.title}</div>
      <div style="font-size:11px;color:#888;margin-bottom:5px">${job.addr}</div>
      <div style="font-size:11px;font-weight:600;color:${color}">${job.type.toUpperCase()} · ${dateStr}</div>
    </div>`
  });
  marker.addListener('click', () => {
    if (infoWindowOpen) infoWindowOpen.close();
    iw.open(map, marker); infoWindowOpen = iw;
    highlightItem('sched-' + scheduledJobs.indexOf(job));
  });
  job._marker = marker; job._iw = iw;
  applyFilters();
}
 
function buildUnschedMarker(job, label) {
  const color = COLORS.unscheduled;
  const marker = new google.maps.Marker({
    position: { lat: job._lat, lng: job._lng }, map,
    icon: makeIcon(label, color), title: `${job.job_num} — ${job.title}`, zIndex: 200
  });
  const iw = new google.maps.InfoWindow({
    content: `<div style="font-family:'DM Sans',sans-serif;min-width:200px;padding:3px 0">
      <div style="font-size:10px;color:#aaa;font-weight:700;letter-spacing:.05em;font-family:'DM Mono',monospace">${job.job_num}</div>
      <div style="font-weight:700;font-size:13px;margin:3px 0;color:#1a1a1a">${job.title}</div>
      <div style="font-size:11px;color:#888;margin-bottom:5px">${job.address}</div>
      <div style="font-size:11px;font-weight:600;color:${color}">UNSCHEDULED · Added by ${job.added_by || 'Unknown'}</div>
    </div>`
  });
  marker.addListener('click', () => {
    if (infoWindowOpen) infoWindowOpen.close();
    iw.open(map, marker); infoWindowOpen = iw;
    highlightItem('unsched-' + unscheduledJobs.indexOf(job));
  });
  job._marker = marker; job._iw = iw;
}
 
// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;
  scheduledJobs.forEach(j => { if (j._marker) j._marker.setVisible(false); });
  unscheduledJobs.forEach(j => { if (j._marker) j._marker.setVisible(false); });
  if (activeTypes.has('unscheduled')) {
    unscheduledJobs.forEach((job, i) => {
      if (job._marker && job._status === 'ok') {
        job._marker.setIcon(makeIcon('U' + (i + 1), COLORS.unscheduled));
        job._marker.setVisible(true);
      }
    });
  }
  let n = 0;
  scheduledJobs.forEach(job => {
    const show = activeTypes.has(job.type) && job.start >= from && job.start <= to && job._status === 'ok';
    if (job._marker) {
      if (show) {
        n++; job._visLabel = n;
        job._marker.setIcon(makeIcon(n, COLORS[job.type] || COLORS.install));
        job._marker.setZIndex(n);
        job._marker.setVisible(true);
      } else {
        job._visLabel = null;
        job._marker.setVisible(false);
      }
    }
  });
  renderList(); updateCount();
}
 
function getVisibleScheduled() {
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;
  return scheduledJobs.filter(j => activeTypes.has(j.type) && j.start >= from && j.start <= to);
}
 
function resetFilters() {
  const today = new Date();
  const twoMonths = new Date(today); twoMonths.setDate(twoMonths.getDate() + 60);
  document.getElementById('date-from').value = fmt(today);
  document.getElementById('date-to').value = fmt(twoMonths);
  activeTypes.add('install'); activeTypes.add('service'); activeTypes.add('unscheduled');
  updateButtons();
  document.getElementById('unsched-add').className = 'unsched-add visible';
  applyFilters();
}
 
// ── Render list ───────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('job-list');
  const rows = [];
  if (activeTypes.has('unscheduled')) {
    unscheduledJobs.forEach((job, i) => {
      const sc = job._status === 'pending' ? 'pending' : job._status === 'error' ? 'error' : 'unscheduled';
      rows.push(`<div class="job-item" id="item-unsched-${i}" onclick="focusUnsched('${job.id}')">
        <div class="pin-badge ${sc}">U${i + 1}</div>
        <div class="job-info">
          <div class="job-num">${job.job_num}</div>
          <div class="job-title">${job.title}</div>
          <div class="job-addr">${job.address}</div>
          <div class="job-meta">
            <span class="badge unscheduled">unscheduled</span>
            <span class="added-by">Added by ${job.added_by || 'Unknown'}</span>
          </div>
        </div>
        <button class="btn-remove" onclick="event.stopPropagation();removeUnsched('${job.id}')" title="Remove">✕</button>
      </div>`);
    });
  }
  let n = 0;
  getVisibleScheduled().forEach(job => {
    const sc = job._status === 'pending' ? 'pending' : job._status === 'error' ? 'error' : job.type;
    const dateStr = job.start === job.end ? fmtDate(job.start) : `${fmtDate(job.start)} – ${fmtDate(job.end)}`;
    const label = job._status === 'ok' ? ++n : '–';
    rows.push(`<div class="job-item" id="item-sched-${scheduledJobs.indexOf(job)}" onclick="focusJob(${scheduledJobs.indexOf(job)})">
      <div class="pin-badge ${sc}">${label}</div>
      <div class="job-info">
        <div class="job-num">${job.num || '—'}</div>
        <div class="job-title">${job.title}</div>
        <div class="job-addr">${job.addr}</div>
        <div class="job-meta"><span class="badge ${job.type}">${job.type}</span>${dateStr}</div>
      </div>
    </div>`);
  });
  list.innerHTML = rows.length ? rows.join('') : '<div class="no-results">No jobs match current filters</div>';
}
 
function focusJob(idx) {
  const job = scheduledJobs[idx];
  if (!job._marker || !job._marker.getVisible()) return;
  map.panTo({ lat: job._lat, lng: job._lng }); map.setZoom(14);
  if (infoWindowOpen) infoWindowOpen.close();
  job._iw.open(map, job._marker); infoWindowOpen = job._iw;
  highlightItem('sched-' + idx);
}
 
// ── Unscheduled ───────────────────────────────────────────────────────────────
function loadUnscheduled() {
  scriptGet('getUnsched')
    .then(data => {
      unscheduledJobs.forEach(j => { if (j._marker) j._marker.setMap(null); });
      unscheduledJobs = data.jobs || [];
      unscheduledJobs.forEach(j => { j._status = 'pending'; j._marker = null; j._iw = null; });
      renderList();
      geocodeUnscheduled();
    })
    .catch(err => console.error('Failed to load unscheduled:', err));
}
 
function geocodeUnscheduled() {
  let delay = 0;
  unscheduledJobs.forEach((job, i) => {
    setTimeout(() => {
      geocoder.geocode({ address: job.address }, (results, status) => {
        if (status === 'OK') {
          job._lat = results[0].geometry.location.lat();
          job._lng = results[0].geometry.location.lng();
          job._status = 'ok';
          buildUnschedMarker(job, 'U' + (i + 1));
        } else { job._status = 'error'; }
        renderList(); updateCount();
      });
    }, delay);
    delay += 120;
  });
}
 
function addUnscheduled() {
  const num = document.getElementById('u-num').value.trim();
  const title = document.getElementById('u-title').value.trim();
  const addr = document.getElementById('u-addr').value.trim();
  if (!num || !addr) { alert('Job number and address are required.'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  scriptPost({ action: 'addUnsched', job_num: num, title: title || num, address: addr, added_by: currentUser })
    .then(() => {
      document.getElementById('u-num').value = '';
      document.getElementById('u-title').value = '';
      document.getElementById('u-addr').value = '';
      btn.disabled = false; btn.textContent = '+ Add to map';
      document.getElementById('u-num').focus();
      loadUnscheduled();
    })
    .catch(() => { btn.disabled = false; btn.textContent = '+ Add to map'; alert('Failed to save. Try again.'); });
}
 
function removeUnsched(id) {
  const job = unscheduledJobs.find(j => String(j.id) === String(id));
  if (job && job._marker) job._marker.setMap(null);
  scriptPost({ action: 'removeUnsched', id })
    .then(() => loadUnscheduled())
    .catch(() => alert('Failed to remove. Try again.'));
}
 
function focusUnsched(id) {
  const job = unscheduledJobs.find(j => String(j.id) === String(id));
  if (!job || !job._marker) return;
  map.panTo({ lat: job._lat, lng: job._lng }); map.setZoom(14);
  if (infoWindowOpen) infoWindowOpen.close();
  job._iw.open(map, job._marker); infoWindowOpen = job._iw;
  highlightItem('unsched-' + unscheduledJobs.indexOf(job));
}
 
function highlightItem(id) {
  document.querySelectorAll('.job-item').forEach(el => el.classList.remove('highlighted'));
  const el = document.getElementById('item-' + id);
  if (el) { el.classList.add('highlighted'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}
 
function fitVisible() {
  const bounds = new google.maps.LatLngBounds(); let any = false;
  scheduledJobs.forEach(j => { if (j._marker && j._marker.getVisible()) { bounds.extend({ lat: j._lat, lng: j._lng }); any = true; } });
  unscheduledJobs.forEach(j => { if (j._marker && j._marker.getVisible()) { bounds.extend({ lat: j._lat, lng: j._lng }); any = true; } });
  if (any) map.fitBounds(bounds);
}
 
function updateCount() {
  const sched = getVisibleScheduled().filter(j => j._status === 'ok').length;
  const unsched = activeTypes.has('unscheduled') ? unscheduledJobs.filter(j => j._status === 'ok').length : 0;
  const total = sched + unsched;
  document.getElementById('header-count').textContent = `${total} job${total !== 1 ? 's' : ''} shown`;
}
 
document.addEventListener('keydown', e => {
  if (document.getElementById('app').style.display === 'none') return;
  if (e.key === 'Enter' && ['u-num', 'u-title', 'u-addr'].includes(document.activeElement?.id)) addUnscheduled();
});
</script>
